name: Production smoke test

on:
  push:
    branches:
      - main
  schedule:
    - cron: "22 * * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to smoke test"
        required: false
        default: "https://moosqa-ci4e.vercel.app"

permissions:
  contents: read
  statuses: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve smoke target
        id: target
        env:
          INPUT_BASE_URL: ${{ inputs.base_url }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_BASE_URL}" ]; then
            echo "base_url=${INPUT_BASE_URL}" >> "${GITHUB_OUTPUT}"
          else
            echo "base_url=https://moosqa-ci4e.vercel.app" >> "${GITHUB_OUTPUT}"
          fi

      - name: Wait for Vercel deployment
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          VERCEL_CONTEXT: Vercel – moosqa-ci4e
        run: |
          set -euo pipefail
          node <<'NODE'
          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.REPOSITORY;
          const commitSha = process.env.COMMIT_SHA;
          const vercelContext = process.env.VERCEL_CONTEXT;
          const deadline = Date.now() + 8 * 60 * 1000;
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          while (Date.now() < deadline) {
            const response = await fetch(
              `https://api.github.com/repos/${repository}/commits/${commitSha}/status`,
              {
                headers: {
                  accept: "application/vnd.github+json",
                  authorization: `Bearer ${token}`,
                },
              },
            );

            if (!response.ok) {
              throw new Error(`GitHub status request failed with ${response.status}`);
            }

            const payload = await response.json();
            const deployment = payload.statuses?.find((status) => status.context === vercelContext);
            const state = deployment?.state || "missing";
            const description = deployment?.description || "No Vercel status yet";
            console.log(`${vercelContext}: ${state} - ${description}`);

            if (state === "success") {
              process.exit(0);
            }
            if (state !== "pending" && state !== "missing") {
              throw new Error(`${vercelContext} finished with ${state}`);
            }

            await sleep(15_000);
          }

          throw new Error(`${vercelContext} did not finish before the smoke wait timeout`);
          NODE

      - name: Wait for public health endpoint
        env:
          BASE_URL: ${{ steps.target.outputs.base_url }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const baseUrl = process.env.BASE_URL.replace(/\/$/, "");
          const deadline = Date.now() + 2 * 60 * 1000;
          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          while (Date.now() < deadline) {
            try {
              const response = await fetch(`${baseUrl}/api/health`, {
                headers: {
                  accept: "application/json",
                },
              });
              console.log(`/api/health: ${response.status}`);
              if (response.ok) {
                process.exit(0);
              }
            } catch (error) {
              console.log(`/api/health unavailable: ${error instanceof Error ? error.message : String(error)}`);
            }

            await sleep(10_000);
          }

          throw new Error(`/api/health did not become ready for ${baseUrl}`);
          NODE

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production smoke tests
        env:
          MOOSQA_SMOKE_BASE_URL: ${{ steps.target.outputs.base_url }}
        run: npm run smoke:prod
