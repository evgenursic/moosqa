name: Quality enrichment

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Call MooSQA bounded quality endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://moosqa-ci4e.vercel.app/api/sync?quality=1&limit=6
        run: |
          curl --fail --show-error --silent \
            --retry 1 \
            --retry-delay 8 \
            --max-time 240 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${SYNC_URL}"
