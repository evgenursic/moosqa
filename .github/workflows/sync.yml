name: Sync Reddit feed

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call MooSQA sync endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://moosqa-ci4e.vercel.app/api/sync
        run: |
          curl --fail --show-error --silent \
            --retry 3 \
            --retry-delay 5 \
            --max-time 55 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${SYNC_URL}"
