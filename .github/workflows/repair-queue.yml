name: Repair weak cards

on:
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Call MooSQA repair endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://moosqa-ci4e.vercel.app/api/sync?repair=1&limit=8
        run: |
          curl --fail --show-error --silent \
            --retry 1 \
            --retry-delay 8 \
            --max-time 240 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${SYNC_URL}"
