name: Repair weak cards

on:
  schedule:
    - cron: "43 * * * *"
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Call MooSQA repair endpoint
        id: repair_call
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_URL: https://moosqa-ci4e.vercel.app/api/sync?repair=1&limit=8
        run: |
          curl --fail --show-error --silent \
            --retry 1 \
            --retry-delay 8 \
            --max-time 240 \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            "${SYNC_URL}"
      - name: Report workflow status
        if: always()
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STATUS_URL: https://moosqa-ci4e.vercel.app/api/internal/workflow-status
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ "${JOB_STATUS}" = "success" ]; then STATUS="SUCCESS"; else STATUS="FAILURE"; fi
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${CRON_SECRET}" \
            --header "Content-Type: application/json" \
            --data "{\"workflowName\":\"repair\",\"status\":\"${STATUS}\",\"runUrl\":\"${RUN_URL}\",\"branch\":\"${BRANCH_NAME}\",\"commitSha\":\"${COMMIT_SHA}\"}" \
            "${STATUS_URL}"
